version: "1.0"
name: "OpenSRE-Env"
description: "An autonomous SRE/DevOps environment where agents must troubleshoot, fix, and restart a broken web server via a simulated bash terminal."
entrypoint: "env:SREEnv"
action_model: "models:SREAction"
observation_model: "models:SREObservation"
reward_model: "models:SREReward"
state_model: "models:SREState"
tasks:
  - id: "easy"
    difficulty: "easy"
  - id: "medium"
    difficulty: "medium"
  - id: "hard"
    difficulty: "hard"